<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenMedia AI - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

    <div class="main-wrapper">
        <div class="top-academic-bar">
            <img src="img/uni-logo.png" alt="SVU" class="svu-mini-logo">
            <span class="course-tag">ITE_BMM601 | S25</span>
        </div>

        <section class="main-core">
            <div class="brain-container">
                <img src="img/animated.webp" alt="AI Brain" class="animated-brain">
            </div>
            
            <div class="brand-text">
                <h1 class="glow-title">أفق الذكاء التوليدي</h1>
                <p class="sub-text">بوابة استعراض تقنيات الوسائط المتعددة والذكاء الاصطناعي</p>
            </div>
        </section>

        <div class="tiles-grid">
            <a href="images.html" class="tile">
                <span class="icon">🖼️</span>
                <h3>معرض الصور</h3>
                <p>تحليل الصور والبرومبتات</p>
            </a>
            
            <a href="media.html" class="tile">
                <span class="icon">🎬</span>
                <h3>الوسائط الذكية</h3>
                <p>تجارب الفيديو والمونتاج</p>
            </a>

            <a href="about.html" class="tile">
                <span class="icon">👥</span>
                <h3>فريق العمل</h3>
                <p>الباحثون السبعة</p>
            </a>

            <a href="index.html" class="tile exit">
                <span class="icon">🏠</span>
                <h3>الرئيسية</h3>
                <p>صفحة المدخل</p>
            </a>
        </div>

        <footer class="simple-footer">
            <p>جميع الحقوق محفوظة - فريق عمل ITE_BMM601</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
